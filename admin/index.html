<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Administration — Amandine Art</title>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    // Configuration injectée directement pour éviter les problèmes de chargement YAML
    CMS.init({
      config: {
        backend: {
          name: "github",
          repo: "vbardales/test-amandine",
          branch: "main",
          base_url: "https://amandine-art.vercel.app",
          auth_endpoint: "/api/auth"
        },
        locale: "fr",
        media_folder: "images/creations",
        public_folder: "images/creations",
        slug: {
          encoding: "ascii",
          clean_accents: true
        },
        collections: [
          {
            name: "donnees",
            label: "Données du site",
            files: [
              {
                name: "creations",
                label: "Mes créations",
                file: "creations.json",
                description: "Ajoute, modifie ou supprime tes créations ici",
                fields: [
                  {
                    name: "creations",
                    label: "Créations",
                    label_singular: "Création",
                    widget: "list",
                    summary: "{{fields.titre}} — {{fields.categorie}}",
                    fields: [
                      { name: "titre", label: "Titre", widget: "string", hint: "Le nom de ta création" },
                      { name: "description", label: "Description", widget: "text", hint: "Décris ta création en quelques phrases" },
                      { name: "image", label: "Image", widget: "image", hint: "Clique pour choisir ou déposer ton image" },
                      {
                        name: "categorie",
                        label: "Catégorie",
                        widget: "select",
                        options: ["Dessin", "Aquarelle", "Peinture", "Illustration", "Création manuelle", "Autre"],
                        hint: "Choisis la catégorie qui correspond le mieux"
                      },
                      { name: "date", label: "Date", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false, hint: "La date de ta création" }
                    ]
                  }
                ]
              }
            ]
          }
        ]
      }
    });
  </script>
</body>
</html>
